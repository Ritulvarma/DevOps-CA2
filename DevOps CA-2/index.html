<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Registration Form</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Internal CSS for additional styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .gender-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .gender-options label {
            font-weight: normal;
            display: flex;
            align-items: center;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        #submitBtn {
            background-color: #4CAF50;
            color: white;
        }
        #resetBtn {
            background-color: #f44336;
            color: white;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Feedback Registration Form</h1>
        <form id="feedbackForm" novalidate>
            <label for="name">Student Name:</label>
            <input type="text" id="name" name="name">
            <div id="nameError" class="error"></div>

            <label for="email">Email ID:</label>
            <input type="email" id="email" name="email">
            <div id="emailError" class="error"></div>

            <label for="mobile">Mobile Number:</label>
            <input type="tel" id="mobile" name="mobile">
            <div id="mobileError" class="error"></div>

            <label for="department">Department:</label>
            <select id="department" name="department">
                <option value="">Select Department</option>
                <option value="CS">Computer Science</option>
                <option value="IT">Information Technology</option>
                <option value="EE">Electrical Engineering</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
            </select>
            <div id="departmentError" class="error"></div>

            <label>Gender:</label>
            <div class="gender-options">
                <label>
                    <input type="radio" id="male" name="gender" value="male">
                    Male
                </label>
                <label>
                    <input type="radio" id="female" name="gender" value="female">
                    Female
                </label>
                <label>
                    <input type="radio" id="other" name="gender" value="other">
                    Other
                </label>
            </div>
            <div id="genderError" class="error"></div>

            <label for="comments">Feedback Comments:</label>
            <textarea id="comments" name="comments"></textarea>
            <div id="commentsError" class="error"></div>

            <div>
                <button type="submit" id="submitBtn">Submit</button>
                <button type="reset" id="resetBtn">Reset</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
